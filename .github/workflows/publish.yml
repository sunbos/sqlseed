name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  release-build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: pip install build

      - name: Build sqlseed
        run: python -m build

      - name: Build sqlseed-ai
        run: |
          cd plugins/sqlseed-ai
          python -m build
          mv dist/*.whl dist/*.tar.gz ../../dist/

      - name: Build mcp-server-sqlseed
        run: |
          cd plugins/mcp-server-sqlseed
          python -m build
          mv dist/*.whl dist/*.tar.gz ../../dist/

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/sqlseed/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: dist/
